theme: minima

title: "Security Writeups"
tagline: "CTF · Pentest · Bug Bounty · Research"
description: >-
  Personal collection of security writeups, penetration testing notes,
  and vulnerability research.

url: "https://Polawat14.github.io"
baseurl: "/writeups"

# Social links
github:
  username: Polawat14

twitter:
  username: ""

social:
  name: "Your Name"
  email: ""
  links:
    - https://github.com/Polawat14

# Analytics (optional)
# google_analytics: G-XXXXXXXXXX

# Theme settings
theme_mode: dark   # light | dark

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Pagination
paginate: 10

# Collections
collections:
  tabs:
    output: true
    sort_by: order

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from build
exclude:
  - "*.gemspec"
  - "*.gem"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - assets/scripts
